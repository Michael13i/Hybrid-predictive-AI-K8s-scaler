name: CD - Manual Deploy to EKS

env:
  AWS_REGION: "eu-central-1"
  AWS_IAM_ROLE_ARN: "arn:aws:iam::655748577231:role/github-aws-integration-role"
  EKS_CLUSTER_NAME: "predictive-llm-k8s-cluster"
  STATE_BUCKET: "predictive-llm-k8s-tfstate-655748577231"
  K8S_NAMESPACE: "default"
  DEPLOYMENT_NAME: "predictive-llm-scaler"
  CONTAINER_NAME: "scaler"

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      image_uri:
        description: "ECR image URI to deploy"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: aws-eks-dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_IAM_ROLE_ARN }}

      - name: Test AWS credentials
        run: aws sts get-caller-identity

      - name: Ensure Terraform state S3 bucket exists
        run: |
          if aws s3api head-bucket --bucket "$STATE_BUCKET" 2>/dev/null; then
            echo "State bucket already exists: $STATE_BUCKET"
          else
            echo "Creating state bucket: $STATE_BUCKET"
            aws s3api create-bucket \
              --bucket "$STATE_BUCKET" \
              --region "$AWS_REGION" \
              --create-bucket-configuration LocationConstraint="$AWS_REGION"
          fi

          aws s3api put-bucket-versioning \
            --bucket "$STATE_BUCKET" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "$STATE_BUCKET" \
            --server-side-encryption-configuration '{
              "Rules": [
                {
                  "ApplyServerSideEncryptionByDefault": {
                    "SSEAlgorithm": "AES256"
                  }
                }
              ]
            }'

          aws s3api put-public-access-block \
            --bucket "$STATE_BUCKET" \
            --public-access-block-configuration '{
              "BlockPublicAcls": true,
              "IgnorePublicAcls": true,
              "BlockPublicPolicy": true,
              "RestrictPublicBuckets": true
            }'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME

      - name: Ensure EBS CSI addon exists
        run: |
          aws eks create-addon \
            --cluster-name $EKS_CLUSTER_NAME \
            --addon-name aws-ebs-csi-driver \
            --region $AWS_REGION \
          || aws eks update-addon \
            --cluster-name $EKS_CLUSTER_NAME \
            --addon-name aws-ebs-csi-driver \
            --region $AWS_REGION

      - name: Wait for EBS CSI driver
        run: kubectl rollout status deployment/ebs-csi-controller -n kube-system --timeout=300s

      - name: Add Helm repo
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

      - name: Ensure monitoring namespace exists
        run: kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

      - name: Install or upgrade Prometheus
        run: |
          helm upgrade --install prometheus prometheus-community/prometheus \
            -n monitoring \
            -f k8s/aws/prometheus-values.yaml

      - name: Wait for Prometheus PVC
        run: |
          kubectl wait --for=jsonpath='{.status.phase}'=Bound pvc/prometheus-server -n monitoring --timeout=300s
          kubectl wait --for=jsonpath='{.status.phase}'=Bound pvc/storage-prometheus-alertmanager-0 -n monitoring --timeout=300s

      - name: Wait for Prometheus pods
        run: |
          kubectl rollout status deployment/prometheus-server -n monitoring --timeout=300s
          kubectl rollout status statefulset/prometheus-alertmanager -n monitoring --timeout=300s

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/generated/scaler-configmap.yaml
          kubectl apply -f k8s/aws/wiremock.yaml
          kubectl apply -f k8s/aws/predictive-llm-scaler.yaml

      - name: Deploy selected scaler image
        run: |
          kubectl set image deployment/$DEPLOYMENT_NAME \
            $CONTAINER_NAME=${{ inputs.image_uri }} \
            -n $K8S_NAMESPACE

      - name: Wait for application rollouts
        run: |
          kubectl rollout status deployment/wiremock -n $K8S_NAMESPACE --timeout=300s
          kubectl rollout status deployment/$DEPLOYMENT_NAME -n $K8S_NAMESPACE --timeout=300s

      - name: Show final cluster state
        run: |
          kubectl get pods -A
          kubectl get pvc -n monitoring
          kubectl get svc -A
          kubectl get deployment predictive-llm-scaler -n default -o jsonpath='{.spec.template.spec.containers[0].image}'
          echo
