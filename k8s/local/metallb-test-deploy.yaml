apiVersion: apps/v1
kind: Deployment
metadata:
  name: metallb-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metallb
  template:
    metadata:
      labels:
        app: metallb
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
