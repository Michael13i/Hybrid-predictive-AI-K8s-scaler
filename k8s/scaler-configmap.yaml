apiVersion: v1
kind: ConfigMap
metadata:
  name: predictive-llm-scaler-config
  namespace: default
data:
  PROMETHEUS_URL: "http://CHANGE_ME_PROMETHEUS:80"
  OLLAMA_URL: "http://CHANGE_ME_OLLAMA:11434"
  OLLAMA_MODEL: "llama2:7b"
  TARGET_DEPLOYMENT: "wiremock"
  TARGET_NAMESPACE: "default"
  MIN_REPLICAS: "1"
  MAX_REPLICAS: "6"
  COOLDOWN_SEC: "300"
  TARGET_CPU_PER_POD: "0.1"
  SAFETY_MARGIN: "1.2"
  SLEEP_SEC: "300"
  FORECAST_DAYS: "2"
